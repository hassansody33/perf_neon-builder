name: Playground

on:
  workflow_dispatch:
  schedule:
    - cron: '5 2 * * 0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.ts.outputs.TIME }}
      date: ${{ steps.ts.outputs.DATE }}
    strategy:
      matrix:
        include:
          # --- sweet-playground Builds ---
          - build-type: sweet-playground
            ksu-type: zako-susfs
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: rekernel

          - build-type: sweet-playground
            ksu-type: none
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: rekernel

          # --- sweet-miui Builds ---
          - build-type: sweet-miui
            ksu-type: zako-susfs
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: rekernel

          - build-type: sweet-miui
            ksu-type: none
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: rekernel

          # --- mi89x7-playground Builds ---
          - build-type: mi89x7-playground
            ksu-type: zako-susfs
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: rekernel

          - build-type: mi89x7-playground
            ksu-type: none
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: rekernel

          # --- a52q Builds ---
          - build-type: a52q
            ksu-type: zako
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: none

          - build-type: a52q
            ksu-type: none
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: none

          # --- a72q Builds ---
          - build-type: a72q
            ksu-type: zako
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: none

          - build-type: a72q
            ksu-type: none
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: none

          # --- d2s Builds ---
          - build-type: d2s
            ksu-type: zako
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: none

          - build-type: d2s
            ksu-type: none
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: none

          # --- d2x Builds ---
          - build-type: d2x
            ksu-type: zako
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: none

          - build-type: d2x
            ksu-type: none
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: none

          # --- a9y18qlte Builds ---
          - build-type: a9y18qlte
            ksu-type: zako
            bbg-type: none
            nomount-type: none
            droidspaces-type: none
            rekernel-type: none

          - build-type: a9y18qlte
            ksu-type: none
            bbg-type: none
            nomount-type: none
            droidspaces-type: none
            rekernel-type: none

          # --- miatoll Builds ---
          - build-type: miatoll
            ksu-type: zako-susfs
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: rekernel

          - build-type: miatoll
            ksu-type: none
            bbg-type: bbg
            nomount-type: nomount
            droidspaces-type: none
            rekernel-type: rekernel

    steps:
      - uses: actions/checkout@v6

      - name: Timestamp
        id: ts
        run: |
          DATE=$(date +'%Y%m%d')
          TIME=$(date +'%s')
          echo "DATE=$DATE" >> $GITHUB_OUTPUT
          echo "TIME=$TIME" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential bison flex zip p7zip-full \
            libc6 curl libstdc++6 git wget libssl-dev zstd \
            lld python3 patchutils ccache

      - name: Preparing kernel sources
        run: |
          if [[ "${{ matrix.build-type }}" == "mi89x7-playground" ]]; then
            if [ -d "$PWD/android_kernel_xiaomi_msm8937" ]; then
              rm -rf android_kernel_xiaomi_msm8937
            fi
            echo "Cloning kernel sources..."
            # Main source
            git clone https://github.com/Mi-Thorium/kernel_msm-4.19 --depth=1 -b "mithorium/a13/master" android_kernel_xiaomi_msm8937
            # Dts vendor-legacy
            git clone https://github.com/Mi-Thorium/kernel_devicetree_msm-4.19 --depth=1 -b "dts/master" android_kernel_xiaomi_msm8937/arch/arm64/boot/dts/vendor-legacy
            # Dts msm8937
            git clone https://github.com/Mi-Thorium/kernel_devicetree_xiaomi-msm8937 --depth=1 -b "dts/mi8937/4.19/master" android_kernel_xiaomi_msm8937/arch/arm64/boot/dts/xiaomi-msm8937
            # Dts sdm439
            git clone https://github.com/Mi-Thorium/kernel_devicetree_xiaomi-sdm439 --depth=1 -b "dts/mi439/4.19/master" android_kernel_xiaomi_msm8937/arch/arm64/boot/dts/xiaomi-sdm439
            # Techpack msm8937
            git clone https://github.com/Mi-Thorium/kernel_techpack_xiaomi-msm8937 --depth=1 -b "techpack/mi8937/4.19/master" android_kernel_xiaomi_msm8937/techpack/xiaomi-msm8937
            # Techpack sdm439
            git clone https://github.com/Mi-Thorium/kernel_techpack_xiaomi-sdm439 --depth=1 -b "techpack/mi439/4.19/master" android_kernel_xiaomi_msm8937/techpack/xiaomi-sdm439
            # Techpack audio-legacy
            git clone https://github.com/Mi-Thorium/kernel_techpack_audio-legacy --depth=1 -b "audio/4.19/mithorium/master" android_kernel_xiaomi_msm8937/techpack/audio-legacy
            # Techpack camera-legacy
            git clone https://github.com/Mi-Thorium/kernel_techpack_camera-legacy --depth=1 -b "camera/LA.UM.8.6.r1-05300-89xx.0/4.19/mithorium" android_kernel_xiaomi_msm8937/techpack/camera-legacy
            # Techpack camera-legacy-m
            git clone https://github.com/Mi-Thorium/kernel_techpack_camera-legacy --depth=1 -b "camera/LA.UM.5.3-10610-89xx.0/4.19/mithorium" android_kernel_xiaomi_msm8937/techpack/camera-legacy-m
            # Prima WIFI
            git clone https://github.com/Mi-Thorium/vendor_qcom_opensource_wlan_prima --depth=1 -b "wlan/LA.UM.9.6.4/mithorium/master" android_kernel_xiaomi_msm8937/drivers/staging/prima
            # Final
            echo "Copying buildscript..."
            cp build.sh android_kernel_xiaomi_msm8937/
            cp -r scripts android_kernel_xiaomi_msm8937/
            chmod +x ./android_kernel_xiaomi_msm8937/build.sh
          elif [[ "${{ matrix.build-type }}" == "sweet-playground" ]]; then
            if [ -d "$PWD/android_kernel_xiaomi_sm6150" ]; then
              rm -rf android_kernel_xiaomi_sm6150
            fi
            echo "Cloning kernel sources..."
            git clone https://github.com/PixelOS-Devices/android_kernel_xiaomi_sm6150.git -b "sixteen-qpr2" --depth=1 android_kernel_xiaomi_sm6150
            echo "Copying buildscript..."
            cp build.sh android_kernel_xiaomi_sm6150/
            cp -r scripts android_kernel_xiaomi_sm6150/
            chmod +x ./android_kernel_xiaomi_sm6150/build.sh
          elif [[ "${{ matrix.build-type }}" == "a52q" || "${{ matrix.build-type }}" == "a72q" ]]; then
            if [ -d "$PWD/android_kernel_samsung_sm7125" ]; then
              rm -rf android_kernel_samsung_sm7125
            fi
            echo "Cloning kernel sources..."
            git clone https://github.com/LineageOS/android_kernel_samsung_sm7125.git -b "lineage-23.2" --depth=1 android_kernel_samsung_sm7125
            echo "Copying buildscript..."
            cp build.sh android_kernel_samsung_sm7125/
            cp -r scripts android_kernel_samsung_sm7125/
            chmod +x ./android_kernel_samsung_sm7125/build.sh
          elif [[ "${{ matrix.build-type }}" == "d2s" || "${{ matrix.build-type }}" == "d2x" ]]; then
            if [ -d "$PWD/android_kernel_samsung_exynos9820" ]; then
              rm -rf android_kernel_samsung_exynos9820
            fi
            echo "Cloning kernel sources..."
            git clone https://github.com/LineageOS/android_kernel_samsung_exynos9820.git -b "lineage-23.2" --depth=1 android_kernel_samsung_exynos9820
            echo "Copying buildscript..."
            cp build.sh android_kernel_samsung_exynos9820/
            cp -r scripts android_kernel_samsung_exynos9820/
            chmod +x ./android_kernel_samsung_exynos9820/build.sh
          elif [[ "${{ matrix.build-type }}" == "a9y18qlte" ]]; then
            if [ -d "$PWD/android_kernel_samsung_a9y18qlte" ]; then
              rm -rf android_kernel_samsung_a9y18qlte
            fi
            echo "Cloning kernel sources..."
            git clone https://github.com/riarumoda/kernel_samsung_a9y18qlte.git -b "master" --depth=1 android_kernel_samsung_a9y18qlte
            echo "Copying buildscript..."
            cp build.sh android_kernel_samsung_a9y18qlte/
            cp -r scripts android_kernel_samsung_a9y18qlte/
            chmod +x ./android_kernel_samsung_a9y18qlte/build.sh
          elif [[ "${{ matrix.build-type }}" == "miatoll" ]]; then
            if [ -d "$PWD/android_kernel_xiaomi_sm6250" ]; then
              rm -rf android_kernel_xiaomi_sm6250
            fi
            echo "Cloning kernel sources..."
            git clone https://github.com/LineageOS/android_kernel_xiaomi_sm6250.git -b "lineage-22.2" --depth=1 android_kernel_xiaomi_sm6250
            echo "Copying buildscript..."
            cp build.sh android_kernel_xiaomi_sm6250/
            cp -r scripts android_kernel_xiaomi_sm6250/
            chmod +x ./android_kernel_xiaomi_sm6250/build.sh
          elif [[ "${{ matrix.build-type }}" == "sweet-miui" ]]; then
            if [ -d "$PWD/android_kernel_xiaomi_sm6150" ]; then
              rm -rf android_kernel_xiaomi_sm6150
            fi
            echo "Cloning kernel sources..."
            git clone https://github.com/riarumoda/android_kernel_xiaomi_sm6150.git -b "lineage-23.2" --depth=1 android_kernel_xiaomi_sm6150
            echo "Copying buildscript..."
            cp build.sh android_kernel_xiaomi_sm6150/
            cp -r scripts android_kernel_xiaomi_sm6150/
            chmod +x ./android_kernel_xiaomi_sm6150/build.sh
          else
            echo "Invalid build type: ${{ matrix.build-type }}"
            exit 1
          fi

      - name: Compile the kernel
        run: |
          echo "Starting to compile..."
          if [[ "${{ matrix.build-type }}" == "mi89x7-playground" ]]; then
            cd android_kernel_xiaomi_msm8937/
            ./build.sh ${{ matrix.build-type }} ${{ matrix.ksu-type }} ${{ matrix.bbg-type }} ${{ matrix.nomount-type }} ${{ matrix.droidspaces-type }} ${{ matrix.rekernel-type }}
            cd ..
          elif [[ "${{ matrix.build-type }}" == "sweet-playground" ]]; then
            cd android_kernel_xiaomi_sm6150/
            ./build.sh ${{ matrix.build-type }} ${{ matrix.ksu-type }} ${{ matrix.bbg-type }} ${{ matrix.nomount-type }} ${{ matrix.droidspaces-type }} ${{ matrix.rekernel-type }}
            cd ..
          elif [[ "${{ matrix.build-type }}" == "a52q" || "${{ matrix.build-type }}" == "a72q" ]]; then
            cd android_kernel_samsung_sm7125/
            ./build.sh ${{ matrix.build-type }} ${{ matrix.ksu-type }} ${{ matrix.bbg-type }} ${{ matrix.nomount-type }} ${{ matrix.droidspaces-type }} ${{ matrix.rekernel-type }}
            cd ..
          elif [[ "${{ matrix.build-type }}" == "d2s" || "${{ matrix.build-type }}" == "d2x" ]]; then
            cd android_kernel_samsung_exynos9820/
            ./build.sh ${{ matrix.build-type }} ${{ matrix.ksu-type }} ${{ matrix.bbg-type }} ${{ matrix.nomount-type }} ${{ matrix.droidspaces-type }} ${{ matrix.rekernel-type }}
            cd ..
          elif [[ "${{ matrix.build-type }}" == "a9y18qlte" ]]; then
            cd android_kernel_samsung_a9y18qlte/
            ./build.sh ${{ matrix.build-type }} ${{ matrix.ksu-type }} ${{ matrix.bbg-type }} ${{ matrix.nomount-type }} ${{ matrix.droidspaces-type }} ${{ matrix.rekernel-type }}
            cd ..
          elif [[ "${{ matrix.build-type }}" == "miatoll" ]]; then
            cd android_kernel_xiaomi_sm6250/
            ./build.sh ${{ matrix.build-type }} ${{ matrix.ksu-type }} ${{ matrix.bbg-type }} ${{ matrix.nomount-type }} ${{ matrix.droidspaces-type }} ${{ matrix.rekernel-type }}
            cd ..
          elif [[ "${{ matrix.build-type }}" == "sweet-miui" ]]; then
            cd android_kernel_xiaomi_sm6150/
            ./build.sh ${{ matrix.build-type }} ${{ matrix.ksu-type }} ${{ matrix.bbg-type }} ${{ matrix.nomount-type }} ${{ matrix.droidspaces-type }} ${{ matrix.rekernel-type }}
            cd ..
          else
            echo "Invalid build type: ${{ matrix.build-type }}"
            exit 1
          fi

      - name: Preparing AnyKernel3 sources
        run: |
          if [ -d "$PWD/AnyKernel3" ]; then
            rm -rf AnyKernel3
          fi
          git clone https://github.com/riarumoda/AnyKernel3 AnyKernel3 --depth=1
          if [[ "${{ matrix.build-type }}" == "mi89x7-playground" ]]; then
            cp android_kernel_xiaomi_msm8937/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
            sed -i 's/supported.versions=11-16/supported.versions=11-16/' AnyKernel3/anykernel.sh
            sed -i 's/device.name1=sweet/device.name1=mi8937/' AnyKernel3/anykernel.sh
            sed -i 's/device.name2=sweetin/device.name2=mi8917/' AnyKernel3/anykernel.sh
            sed -i '/device.name2=mi8917/a device.name3=santoni\ndevice.name4=prada\ndevice.name5=rolex\ndevice.name6=ugglite\ndevice.name7=riva\ndevice.name8=ugg' AnyKernel3/anykernel.sh
            sed -i 's/sweet (sm6150)/mi8937 and mi8917 (msm8937)/g' AnyKernel3/banner
          elif [[ "${{ matrix.build-type }}" == "sweet-playground" ]]; then
            cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/Image.gz AnyKernel3/
            cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/dtb.img AnyKernel3/
            cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/dtbo.img AnyKernel3/
            sed -i 's/supported.versions=11-16/supported.versions=12-16/' AnyKernel3/anykernel.sh
            if [[ "${{ matrix.build-type }}" == "sweet-playground" ]]; then
              sed -i 's/device.name1=sweet/device.name1=sweet/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=sweetin/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/sweet (sm6150)/g' AnyKernel3/banner
            fi
          elif [[ "${{ matrix.build-type }}" == "a52q" || "${{ matrix.build-type }}" == "a72q" ]]; then
            cp android_kernel_samsung_sm7125/out/arch/arm64/boot/Image.gz AnyKernel3/
            sed -i 's/supported.versions=11-16/supported.versions=15-16/' AnyKernel3/anykernel.sh
            if [[ "${{ matrix.build-type }}" == "a52q" ]]; then
              sed -i 's/device.name1=sweet/device.name1=a52q/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=a52qxx/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/a52q (sm7125)/g' AnyKernel3/banner
            elif [[ "${{ matrix.build-type }}" == "a72q" ]]; then
              sed -i 's/device.name1=sweet/device.name1=a72q/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=a72qxx/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/a72q (sm7125)/g' AnyKernel3/banner
            fi
          elif [[ "${{ matrix.build-type }}" == "d2s" || "${{ matrix.build-type }}" == "d2x" ]]; then
            cp android_kernel_samsung_exynos9820/out/arch/arm64/boot/Image.gz AnyKernel3/
            sed -i 's/supported.versions=11-16/supported.versions=15-16/' AnyKernel3/anykernel.sh
            if [[ "${{ matrix.build-type }}" == "d2s" ]]; then
              sed -i 's/device.name1=sweet/device.name1=d2s/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=d2sxx/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/d2s (exynos9820)/g' AnyKernel3/banner
            elif [[ "${{ matrix.build-type }}" == "d2x" ]]; then
              sed -i 's/device.name1=sweet/device.name1=d2x/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=d2xx/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/d2x (exynos9820)/g' AnyKernel3/banner
            fi
          elif [[ "${{ matrix.build-type }}" == "a9y18qlte" ]]; then
            cp android_kernel_samsung_a9y18qlte/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
            sed -i 's/supported.versions=11-16/supported.versions=10-11/' AnyKernel3/anykernel.sh
            if [[ "${{ matrix.build-type }}" == "a9y18qlte" ]]; then
              sed -i 's/device.name1=sweet/device.name1=a9y18qlte/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=a9y18qltexx/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/a9y18qlte (sdm660)/g' AnyKernel3/banner
            fi
          elif [[ "${{ matrix.build-type }}" == "miatoll" ]]; then
            cp android_kernel_xiaomi_sm6250/out/arch/arm64/boot/Image.gz AnyKernel3/
            sed -i 's/supported.versions=11-16/supported.versions=14-15/' AnyKernel3/anykernel.sh
            sed -i 's/device.name1=sweet/device.name1=miatoll/' AnyKernel3/anykernel.sh
            sed -i 's/device.name2=sweetin/device.name2=gram/' AnyKernel3/anykernel.sh
            sed -i '/device.name2=gram/a device.name3=curtana\ndevice.name4=joyeuse\ndevice.name5=excalibur' AnyKernel3/anykernel.sh
            sed -i 's/sweet (sm6150)/miatoll (sm6250)/g' AnyKernel3/banner
          elif [[ "${{ matrix.build-type }}" == "sweet-miui" ]]; then
            cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/Image.gz AnyKernel3/
            cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/dtb.img AnyKernel3/
            cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/dtbo.img AnyKernel3/
            sed -i 's/supported.versions=11-16/supported.versions=11-14/' AnyKernel3/anykernel.sh
            if [[ "${{ matrix.build-type }}" == "sweet-miui" ]]; then
              sed -i 's/device.name1=sweet/device.name1=sweet/' AnyKernel3/anykernel.sh
              sed -i 's/device.name2=sweetin/device.name2=sweetin/' AnyKernel3/anykernel.sh
              sed -i 's/sweet (sm6150)/sweet (sm6150)/g' AnyKernel3/banner
            fi
          else
            echo "Invalid build type: ${{ matrix.build-type }}"
            exit 1
          fi
          sed -i '$a \\nBuild timestamp: ${{ steps.ts.outputs.TIME }}' AnyKernel3/banner

      - name: Pack kernel with AnyKernel3
        run: |
          if [[ "${{ matrix.ksu-type }}" == "zako" || "${{ matrix.ksu-type }}" == "zako-susfs" ]]; then
            export KSUTYPE="ksu"
          elif [[ "${{ matrix.ksu-type }}" == "none" ]]; then
            export KSUTYPE="noksu"
          fi
          if [[ "${{ matrix.build-type }}" == "sweet-playground" ]]; then
            export KERNELNAME="VantomKernel"
          elif [[ "${{ matrix.build-type }}" == "mi89x7-playground" ]]; then
            export KERNELNAME="Mi8937v2"
          elif [[ "${{ matrix.build-type }}" == "a9y18qlte" ]]; then
            export KERNELNAME="RiaruKernel"
          elif [[ "${{ matrix.build-type }}" == "sweet-miui" ]]; then
            export KERNELNAME="miui-sweet"
          else
            export KERNELNAME="perf-neon"
          fi
          if [[ "${{ matrix.build-type }}" == "sweet-playground" || "${{ matrix.build-type }}" == "mi89x7-playground" ]]; then
            export ZIPNAME="$KERNELNAME-${{ matrix.build-type }}-$KSUTYPE-${{ steps.ts.outputs.DATE }}.zip"
          elif [[ "${{ matrix.build-type }}" == "sweet-miui" ]]; then
            export ZIPNAME="$KERNELNAME-$KSUTYPE-${{ steps.ts.outputs.DATE }}.zip"
          else
            export ZIPNAME="$KERNELNAME-${{ matrix.build-type }}-playground-$KSUTYPE-${{ steps.ts.outputs.DATE }}.zip"
          fi
          cd AnyKernel3
          zip -rq9 "../$ZIPNAME" ./*
          cd ..

      - name: Upload artifacts (All builds)
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.build-type }}-${{ matrix.ksu-type }}
          path: |
            *.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded zips
        run: ls -lah artifacts

      - name: Timestamp
        id: ts
        run: |
          FANCYDATE=$(date +'%Y/%m/%d')
          echo "FANCYDATE=$FANCYDATE" >> $GITHUB_OUTPUT

      - name: Create Release and Upload builds
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: kernel-playground-${{ needs.build.outputs.timestamp }}
          name: Playground - ${{ steps.ts.outputs.FANCYDATE }}
          draft: false
          prerelease: true
          body: |
            > [!IMPORTANT]   
            > - This sections contains community-built kernels thats not a part of LineageOS official releases, also some Official LineageOS kernels that did not meet the standard weekly release.   

            > [!CAUTION]   
            > - Always backup your boot image first before proceeding!   
          files: |
            artifacts/**/*.zip
          overwrite_files: true
